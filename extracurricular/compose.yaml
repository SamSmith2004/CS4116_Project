services:
  app:
    image: washamga/extracurricular-cs4116:latest
    ports:
      - 5173:5173
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      ORIGIN: ${ORIGIN}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    depends_on:
      - db
  db:
    image: postgres
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: local
    volumes:
      - pgdata:/var/lib/postgresql
volumes:
  pgdata: null
networks: {}