version: "3.9"

services:
  app:
    image: washamga/extracurricular-cs4116:latest
    ports:
      - "5173:5173"        # map host port 5173 to container port 5173
    environment:
      NODE_ENV: production
      PORT: 5173
      DATABASE_URL: ${DATABASE_URL}
      ORIGIN: ${ORIGIN}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    # If you want to build locally instead of pulling the image, uncomment:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   args:
    #     DATABASE_URL: ${DATABASE_URL}
    #     ORIGIN: ${ORIGIN}
    #     BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}

